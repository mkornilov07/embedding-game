<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ puzzle.name }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      color: #1a202c;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 2rem;
    }

    /* Word bank */
    .word-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      max-width: 700px;
      margin-bottom: 2.5rem;
    }

    .word-bubble {
      background: #4299e1;
      color: #fff;
      padding: 0.5rem 1.2rem;
      border-radius: 9999px;
      font-size: 1.1rem;
      cursor: grab;
      user-select: none;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .word-bubble:active { cursor: grabbing; }

    .word-bubble.dragging {
      opacity: 0.5;
      transform: scale(1.05);
    }

    .word-bubble.placed {
      background: #a0aec0;
      cursor: default;
    }

    /* Equations */
    .equations {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      width: 100%;
      max-width: 600px;
    }

    .equation {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 600;
    }

    .drop-box {
      width: 130px;
      height: 48px;
      border: 2px dashed #a0aec0;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      transition: border-color 0.15s, background 0.15s;
      font-size: 1.1rem;
      font-weight: 500;
      color: #2d3748;
    }

    .drop-box.drag-over {
      border-color: #4299e1;
      background: #ebf8ff;
    }

    .drop-box.filled {
      border-style: solid;
      border-color: #4299e1;
      background: #ebf8ff;
      cursor: pointer;
    }

    .operator {
      font-size: 1.4rem;
      color: #718096;
    }
  </style>
</head>
<body>
  <h1>{{ puzzle.name }}</h1>

  <div class="word-bank" id="word-bank"></div>

  <div class="equations" id="equations"></div>

  <script>
    const words = {{ words_json|safe }};
    const sequences = {{ sequences_json|safe }};

    const bank = document.getElementById("word-bank");
    const eqContainer = document.getElementById("equations");

    // Render word bubbles
    words.forEach((word, i) => {
      const el = document.createElement("div");
      el.className = "word-bubble";
      el.textContent = word.text;
      el.draggable = true;
      el.dataset.index = i;
      el.addEventListener("dragstart", onDragStart);
      el.addEventListener("dragend", onDragEnd);
      el.addEventListener("click", onBubbleClick);
      bank.appendChild(el);
    });

    // Render sequences
    sequences.forEach((seq, i) => {
      const row = document.createElement("div");
      row.className = "equation";
      row.dataset.sequence = i;

      for (let j = 0; j < seq.num_slots; j++) {
        if (j > 0 && seq.operators[j - 1]) {
          const op = document.createElement("span");
          op.className = "operator";
          op.textContent = seq.operators[j - 1];
          row.appendChild(op);
        }
        const box = document.createElement("div");
        box.className = "drop-box";
        box.dataset.sequence = i;
        box.dataset.slot = j;
        box.addEventListener("dragover", onDragOver);
        box.addEventListener("dragleave", onDragLeave);
        box.addEventListener("drop", onDrop);
        box.addEventListener("click", onBoxClick);
        row.appendChild(box);
      }

      eqContainer.appendChild(row);
    });

    let dragIndex = null;

    function onDragStart(e) {
      const bubble = e.target;
      if (bubble.classList.contains("placed")) {
        e.preventDefault();
        return;
      }
      dragIndex = bubble.dataset.index;
      bubble.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    }

    function placeWord(bubble, box) {
      bubble.classList.add("placed");
      box.textContent = words[bubble.dataset.index].text;
      box.dataset.wordIndex = bubble.dataset.index;
      box.classList.add("filled");
    }

    function onBubbleClick(e) {
      const bubble = e.target;
      if (bubble.classList.contains("placed")) return;
      const box = document.querySelector(".drop-box:not(.filled)");
      if (!box) return;
      placeWord(bubble, box);
    }

    function onDragEnd(e) {
      e.target.classList.remove("dragging");
      dragIndex = null;
    }

    function onDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add("drag-over");
    }

    function onDragLeave(e) {
      e.currentTarget.classList.remove("drag-over");
    }

    function onDrop(e) {
      e.preventDefault();
      const box = e.currentTarget;
      box.classList.remove("drag-over");

      if (dragIndex === null) return;
      if (box.dataset.wordIndex !== undefined) return;

      const bubble = bank.querySelector(`[data-index="${dragIndex}"]`);
      bubble.classList.remove("dragging");
      placeWord(bubble, box);
      dragIndex = null;
    }

    function onBoxClick(e) {
      const box = e.currentTarget;
      if (box.dataset.wordIndex === undefined) return;

      const idx = box.dataset.wordIndex;
      const bubble = bank.querySelector(`[data-index="${idx}"]`);
      bubble.classList.remove("placed");

      box.textContent = "";
      delete box.dataset.wordIndex;
      box.classList.remove("filled");
    }
  </script>
</body>
</html>
