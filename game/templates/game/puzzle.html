<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ puzzle.name }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      color: #1a202c;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 2rem;
    }

    /* Word bank */
    .word-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      max-width: 700px;
      margin-bottom: 2.5rem;
    }

    .word-bubble {
      background: #4299e1;
      color: #fff;
      padding: 0.5rem 1.2rem;
      border-radius: 9999px;
      font-size: 1.1rem;
      cursor: grab;
      user-select: none;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .word-bubble:active { cursor: grabbing; }

    .word-bubble.dragging {
      opacity: 0.5;
      transform: scale(1.05);
    }

    .word-bubble.placed {
      background: #a0aec0;
      cursor: default;
    }

    /* Equations */
    .equations {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      width: 100%;
      max-width: 600px;
    }

    .equation {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 600;
    }

    .solved-section {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .solved-section[hidden] { display: none; }

    .solved-section:not([hidden]) {
      animation: section-enter 0.35s cubic-bezier(0.2, 0.8, 0.3, 1);
    }

    @keyframes section-enter {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .solved-header {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      background: #d1fae5;
      color: #065f46;
      border: 2px solid #10b981;
      border-radius: 9999px;
      padding: 0.4rem 1.1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      align-self: center;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    }

    .solved-header:hover {
      background: #a7f3d0;
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.25);
    }

    .solved-header:active { transform: scale(0.97); }

    .solved-chevron {
      display: inline-block;
      font-size: 0.7rem;
      line-height: 1;
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.3, 1);
    }

    .solved-section:not(.collapsed) .solved-chevron {
      transform: rotate(180deg);
    }

    .solved-list-wrapper {
      display: grid;
      grid-template-rows: 1fr;
      transition: grid-template-rows 0.35s cubic-bezier(0.2, 0.8, 0.3, 1);
    }

    .solved-section.collapsed .solved-list-wrapper {
      grid-template-rows: 0fr;
    }

    .solved-list {
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .solved-list > .equation {
      animation: row-enter 0.3s cubic-bezier(0.2, 0.8, 0.3, 1);
    }

    @keyframes row-enter {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .drop-box {
      width: 130px;
      height: 48px;
      border: 2px dashed #a0aec0;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      transition: border-color 0.15s, background 0.15s;
      font-size: 1.1rem;
      font-weight: 500;
      color: #2d3748;
    }

    .drop-box.drag-over {
      border-color: #4299e1;
      background: #ebf8ff;
    }

    .drop-box.filled {
      border-style: solid;
      border-color: #4299e1;
      background: #ebf8ff;
      cursor: pointer;
    }

    .operator {
      font-size: 1.4rem;
      color: #718096;
    }

    /* Result overlays */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }

    .overlay.show { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Wrong overlay */
    .overlay-wrong {
      background: rgba(220, 38, 38, 0.85);
    }

    .overlay-wrong .icon {
      font-size: 12rem;
      color: #fff;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-15px); }
      40%, 80% { transform: translateX(15px); }
    }

    /* Correct overlay */
    .overlay-correct {
      background: rgba(16, 185, 129, 0.85);
      flex-direction: column;
      gap: 1rem;
    }

    .overlay-correct .icon {
      font-size: 6rem;
      color: #fff;
    }

    .overlay-correct .message {
      font-size: 2.5rem;
      font-weight: 700;
      color: #fff;
    }

    .fireworks {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 101;
    }

    .spark {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: spark 1s ease-out forwards;
    }

    @keyframes spark {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
    }

    .back-btn {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #fff;
      color: #10b981;
      border: none;
      border-radius: 0.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.1s;
    }

    .back-btn:hover {
      transform: scale(1.05);
    }

    .back { margin-bottom: 1rem; }
    .back a { color: #4299e1; text-decoration: none; }
    .back a:hover { text-decoration: underline; }

    .author {
      color: #718096;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .drop-box.slot-wrong {
      border-color: #e53e3e;
      background: #fee2e2;
      color: #991b1b;
    }

    .drop-box.slot-correct {
      border-color: #10b981;
      background: #d1fae5;
      color: #065f46;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      color: #4a5568;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #cbd5e0;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: #4299e1;
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }
  </style>
</head>
<body>
  <div class="back"><a href="{% url 'puzzle_list' %}">&larr; All Puzzles</a></div>
  <h1>{{ puzzle.name }}</h1>
  {% if puzzle.created_by %}<div class="author">by {{ puzzle.created_by.username }}</div>{% endif %}

  <div class="toggle-row">
    <label class="toggle">
      <input type="checkbox" id="error-check-toggle">
      <span class="toggle-slider"></span>
    </label>
    <span>Error checking</span>
  </div>

  <div class="word-bank" id="word-bank"></div>

  <div class="equations" id="equations">
    <div class="solved-section collapsed" id="solved-section" hidden>
      <button type="button" class="solved-header" id="solved-toggle" aria-expanded="false">
        <span id="solved-count"></span>
        <span class="solved-chevron">&#x25BE;</span>
      </button>
      <div class="solved-list-wrapper">
        <div class="solved-list" id="solved-list"></div>
      </div>
    </div>
  </div>

  <div class="overlay overlay-wrong" id="overlay-wrong" onclick="dismissOverlay()">
    <div class="icon">&#x2717;</div>
  </div>

  <div class="overlay overlay-correct" id="overlay-correct">
    <div class="icon">&#x2713;</div>
    <div class="message">Nice!</div>
    <a class="back-btn" href="{% url 'puzzle_list' %}">All Puzzles</a>
    <div class="fireworks" id="fireworks"></div>
  </div>

  <script>
    const words = {{ words_json|safe }};
    const combinations = {{ combinations_json|safe }};
    const checkUrl = "{% url 'check_puzzle' puzzle.pk %}";
    const checkRowUrl = "{% url 'check_row' puzzle.pk %}";
    const csrfToken = "{{ csrf_token }}";

    const bank = document.getElementById("word-bank");
    const eqContainer = document.getElementById("equations");

    // Render word bubbles
    words.forEach((word, i) => {
      const el = document.createElement("div");
      el.className = "word-bubble";
      el.textContent = word.text;
      el.draggable = true;
      el.dataset.index = i;
      el.addEventListener("dragstart", onDragStart);
      el.addEventListener("dragend", onDragEnd);
      el.addEventListener("click", onBubbleClick);
      bank.appendChild(el);
    });

    // Render combinations by type
    combinations.forEach((combo, i) => {
      const row = document.createElement("div");
      row.className = "equation";
      row.dataset.combo = i;

      if (combo.type === "word_sum") {
        for (let j = 0; j < 3; j++) {
          if (j === 1) addOperator(row, "+");
          if (j === 2) addOperator(row, "=");
          row.appendChild(makeDropBox(i, j));
        }
      }

      eqContainer.appendChild(row);
    });

    const solvedSection = document.getElementById("solved-section");
    const solvedList = document.getElementById("solved-list");
    const solvedCount = document.getElementById("solved-count");
    const solvedToggle = document.getElementById("solved-toggle");

    solvedToggle.addEventListener("click", () => {
      const collapsed = solvedSection.classList.toggle("collapsed");
      solvedToggle.setAttribute("aria-expanded", String(!collapsed));
    });

    // Short delay before whisking a correct row away, so the user
    // registers the green slot confirmation first.
    const SOLVE_DELAY_MS = 450;
    const pendingSolve = new Map();

    function cancelPendingSolve(comboIdx) {
      const t = pendingSolve.get(comboIdx);
      if (t !== undefined) {
        clearTimeout(t);
        pendingSolve.delete(comboIdx);
      }
    }

    function scheduleSolve(row) {
      const comboIdx = row.dataset.combo;
      cancelPendingSolve(comboIdx);
      const t = setTimeout(() => {
        pendingSolve.delete(comboIdx);
        markRowSolved(row);
      }, SOLVE_DELAY_MS);
      pendingSolve.set(comboIdx, t);
    }

    function markRowSolved(row) {
      if (row.parentElement === solvedList) return;
      solvedList.appendChild(row);
      updateSolvedSection();
    }

    function markRowUnsolved(row) {
      cancelPendingSolve(row.dataset.combo);
      if (row.parentElement !== solvedList) return;
      const comboIdx = parseInt(row.dataset.combo);
      const siblings = eqContainer.querySelectorAll(":scope > .equation");
      let inserted = false;
      for (const sib of siblings) {
        if (parseInt(sib.dataset.combo) > comboIdx) {
          eqContainer.insertBefore(row, sib);
          inserted = true;
          break;
        }
      }
      if (!inserted) eqContainer.appendChild(row);
      updateSolvedSection();
    }

    function updateSolvedSection() {
      const n = solvedList.children.length;
      if (n === 0) {
        solvedSection.hidden = true;
        return;
      }
      solvedSection.hidden = false;
      solvedCount.textContent = `${n} solved \u2713`;
    }

    function addOperator(row, text) {
      const op = document.createElement("span");
      op.className = "operator";
      op.textContent = text;
      row.appendChild(op);
    }

    function makeDropBox(comboIndex, slot) {
      const box = document.createElement("div");
      box.className = "drop-box";
      box.dataset.combo = comboIndex;
      box.dataset.slot = slot;
      box.addEventListener("dragover", onDragOver);
      box.addEventListener("dragleave", onDragLeave);
      box.addEventListener("drop", onDrop);
      box.addEventListener("click", onBoxClick);
      return box;
    }

    let dragIndex = null;

    function onDragStart(e) {
      const bubble = e.target;
      if (bubble.classList.contains("placed")) {
        e.preventDefault();
        return;
      }
      dragIndex = bubble.dataset.index;
      bubble.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    }

    function placeWord(bubble, box) {
      bubble.classList.add("placed");
      box.textContent = words[bubble.dataset.index].text;
      box.dataset.wordIndex = bubble.dataset.index;
      box.classList.add("filled");
      checkRowIfFull(box.dataset.combo);
      checkAllFilled();
    }

    function onBubbleClick(e) {
      const bubble = e.target;
      if (bubble.classList.contains("placed")) return;
      const box = document.querySelector(".drop-box:not(.filled)");
      if (!box) return;
      placeWord(bubble, box);
    }

    function onDragEnd(e) {
      e.target.classList.remove("dragging");
      dragIndex = null;
    }

    function onDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add("drag-over");
    }

    function onDragLeave(e) {
      e.currentTarget.classList.remove("drag-over");
    }

    function onDrop(e) {
      e.preventDefault();
      const box = e.currentTarget;
      box.classList.remove("drag-over");

      if (dragIndex === null) return;
      if (box.dataset.wordIndex !== undefined) return;

      const bubble = bank.querySelector(`[data-index="${dragIndex}"]`);
      bubble.classList.remove("dragging");
      placeWord(bubble, box);
      dragIndex = null;
    }

    function onBoxClick(e) {
      const box = e.currentTarget;
      if (box.dataset.wordIndex === undefined) return;

      const comboIdx = box.dataset.combo;
      const idx = box.dataset.wordIndex;
      const bubble = bank.querySelector(`[data-index="${idx}"]`);
      bubble.classList.remove("placed");

      box.textContent = "";
      delete box.dataset.wordIndex;
      box.classList.remove("filled");

      clearRowState(comboIdx);
    }

    function clearRowState(comboIdx) {
      const boxes = document.querySelectorAll(`.drop-box[data-combo="${comboIdx}"]`);
      boxes.forEach(b => {
        b.classList.remove("slot-wrong", "slot-correct");
      });
      const row = document.querySelector(`.equation[data-combo="${comboIdx}"]`);
      if (row) markRowUnsolved(row);
    }

    function checkRowIfFull(comboIdx) {
      if (!document.getElementById("error-check-toggle").checked) return;

      const boxes = document.querySelectorAll(`.drop-box[data-combo="${comboIdx}"]`);
      const allFilled = Array.from(boxes).every(b => b.dataset.wordIndex !== undefined);
      if (!allFilled) return;

      const slotWords = Array.from(boxes).map(b => words[b.dataset.wordIndex].text);

      fetch(checkRowUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrfToken,
        },
        body: JSON.stringify({ words: slotWords }),
      })
        .then(r => r.json())
        .then(data => {
          const wrongSet = new Set(data.wrong_slots);
          boxes.forEach((box, j) => {
            box.classList.remove("slot-wrong", "slot-correct");
            if (wrongSet.has(j)) {
              box.classList.add("slot-wrong");
            } else {
              box.classList.add("slot-correct");
            }
          });
          const row = document.querySelector(`.equation[data-combo="${comboIdx}"]`);
          if (wrongSet.size === 0) {
            scheduleSolve(row);
          } else {
            markRowUnsolved(row);
          }
        });
    }

    document.getElementById("error-check-toggle").addEventListener("change", function () {
      if (this.checked) {
        combinations.forEach((_, i) => checkRowIfFull(String(i)));
      } else {
        combinations.forEach((_, i) => clearRowState(String(i)));
      }
    });

    // Check if all boxes are filled, then verify with backend
    function checkAllFilled() {
      const allBoxes = document.querySelectorAll(".drop-box");
      const allFilled = Array.from(allBoxes).every(b => b.dataset.wordIndex !== undefined);
      if (!allFilled) return;

      const payload = combinations.map((combo, i) => {
        const boxes = document.querySelectorAll(`.drop-box[data-combo="${i}"]`);
        const slotWords = Array.from(boxes).map(b => words[b.dataset.wordIndex].text);
        return { id: combo.id, words: slotWords };
      });

      fetch(checkUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrfToken,
        },
        body: JSON.stringify(payload),
      })
        .then(r => r.json())
        .then(data => {
          if (data.correct) {
            showCorrect();
          } else {
            showWrong();
          }
        });
    }

    function showWrong() {
      document.getElementById("overlay-wrong").classList.add("show");
    }

    function dismissOverlay() {
      document.getElementById("overlay-wrong").classList.remove("show");
    }

    function showCorrect() {
      document.getElementById("overlay-correct").classList.add("show");
      launchFireworks();
    }

    function launchFireworks() {
      const container = document.getElementById("fireworks");
      const colors = ["#fbbf24", "#f87171", "#34d399", "#60a5fa", "#a78bfa", "#f472b6"];

      for (let burst = 0; burst < 5; burst++) {
        const cx = Math.random() * window.innerWidth;
        const cy = Math.random() * window.innerHeight * 0.6;

        for (let i = 0; i < 30; i++) {
          const spark = document.createElement("div");
          spark.className = "spark";
          const angle = (Math.PI * 2 * i) / 30;
          const dist = 80 + Math.random() * 120;
          spark.style.left = cx + "px";
          spark.style.top = cy + "px";
          spark.style.background = colors[Math.floor(Math.random() * colors.length)];
          spark.style.setProperty("--dx", Math.cos(angle) * dist + "px");
          spark.style.setProperty("--dy", Math.sin(angle) * dist + "px");
          spark.style.animationDelay = burst * 0.2 + "s";
          container.appendChild(spark);
        }
      }
    }
  </script>
</body>
</html>
